<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UrbanFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        /* Thêm một chút style riêng cho khung đăng nhập */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-container h1 { color: #2c3e50; margin-bottom: 20px; }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .login-btn:hover { background-color: #2980b9; }
        .error-msg { color: #e74c3c; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body style="background-color: #f4f7f6;">
    <div class="login-container">
        <h1>UrbanFlow</h1>
        <p>Traffic Prediction System</p>
        
        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <form action="/authenticate" method="POST">
            <input type="text" name="username" placeholder="Email: user" required>
            <input type="password" name="password" placeholder="Mật khẩu: 123" required>
            <button type="submit" class="login-btn">Đăng nhập</button>
        </form>
    </div>
</body>
</html>
